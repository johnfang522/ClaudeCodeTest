<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px 4px rgba(168, 218, 220, 0.4);
    }

    #reset {
      margin-top: 2rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: white;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    #scores {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      font-size: 1rem;
      color: #aaa;
    }

    #scores span { font-weight: bold; color: #eee; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <button id="reset">New Game</button>
  <div id="scores">
    X wins: <span id="xwins">0</span>
    &nbsp;|&nbsp;
    Draws: <span id="draws">0</span>
    &nbsp;|&nbsp;
    O wins: <span id="owins">0</span>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      scores = { X: 0, O: 0, draw: 0 };
      newGame();
    }

    function newGame() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      render();
      setStatus("X's turn");
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(Boolean)) return { winner: null, line: [] };
      return null;
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      board[i] = current;
      render();

      const result = checkWinner();
      if (result) {
        gameOver = true;
        if (result.winner) {
          scores[result.winner]++;
          setStatus(`${result.winner} wins!`);
          highlight(result.line);
        } else {
          scores.draw++;
          setStatus("It's a draw!");
        }
        updateScores();
      } else {
        current = current === 'X' ? 'O' : 'X';
        setStatus(`${current}'s turn`);
      }
    }

    function highlight(line) {
      const cells = document.querySelectorAll('.cell');
      line.forEach(i => cells[i].classList.add('win'));
    }

    function render() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val || '';
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function updateScores() {
      document.getElementById('xwins').textContent = scores.X;
      document.getElementById('owins').textContent = scores.O;
      document.getElementById('draws').textContent = scores.draw;
    }

    document.getElementById('reset').addEventListener('click', newGame);
    init();
  </script>
</body>
</html>
